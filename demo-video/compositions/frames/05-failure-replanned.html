            { opacity: 1, y: 0, duration: 0.44, ease: "power3.out" },
            0.12,

              duration: 2.18,
              ease: "power3.out",

                x: 0,
                duration: index === 1 ? 0.58 : 0.42,
                ease: index === 1 ? "back.out(1.25)" : "power3.out",
              },
