          const failureSequence = [

          const assignmentBuilderName = document.getElementById("f05-assignment-builder-name");
          const failureText = document.getElementById("f05-failure-text");
          function failureTextAt(time) {
            for (let i = failureSequence.length - 1; i >= 0; i -= 1) {
              if (time >= failureSequence[i].t) return failureSequence[i].text;
            }
            return "Builder";
          }
          tl.to(
            failureDriver,
            {
              t: 11.776,
              duration: 11.776,
              ease: "none",
              onUpdate: () => {
                const state = failureTextAt(failureDriver.t);

              },

          // Scene 4 — rack focus to the recovered plan, then perform the blueprint's

          tl.to(
            "#f05-surface-image",
            { "--dof": "2px", opacity: 0.84, duration: 0.72, ease: "power2.inOut" },
            6.3,

          tl.to(
            "#f05-assignment-builder",
            { scale: 0.72, opacity: 0, duration: 0.4, ease: "power2.in" },
            6.34,

          tl.to(
            "#f05-assignment-reviewer",
            { scale: 1, opacity: 1, duration: 0.62, ease: "back.out(1.55)" },
            6.58,
          );
          tl.fromTo(
            "#f05-status-reviewer",
            { y: 16, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.44, ease: "power3.out" },

          // Content-aware dependency sequencing: each remaining bar receives a duration

          const dependencySequence = [

            { selector: "#f05-ship-bar", mask: "#f05-ship-mask", label: "SHIP", hold: 0.26 },
          ];

            const duration = 0.28 + item.label.length * 0.018 + item.hold;
            const start = dependencyCursor;
            dependencyCursor += duration;
            return { ...item, start, duration };
          });
          dependencyTimeline.forEach((item) => {
            tl.to(item.mask, { opacity: 0, duration: 0.26, ease: "power2.out" }, item.start);
            tl.to(
              item.selector,
              { x: 0, scale: 1, opacity: 1, duration: item.duration, ease: "power3.out" },
