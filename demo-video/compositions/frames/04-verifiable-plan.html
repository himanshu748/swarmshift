        window.__timelines = window.__timelines || {};

        const byId = (id) => document.getElementById(id);
        const tl = gsap.timeline({ paused: true });

        const surface = byId("f4-surface");
        const clickTarget = byId("f4-click-target");
        const cursor = byId("f4-cursor");
        const ripples = [byId("f4-ripple-one"), byId("f4-ripple-two"), byId("f4-ripple-three")];
        const bars = [
          byId("f4-bar-research"),
          byId("f4-bar-build"),
          byId("f4-bar-verify"),
          byId("f4-bar-ship"),
        ];
        const metrics = byId("f4-metrics");
        const pathChip = byId("f4-path-chip");
        const explain = byId("f4-explain");
        const hashStage = byId("f4-hash-stage");

        // Scene 1 — product surface, intentional cursor move, click depression, and ripple.
        tl.fromTo(
          surface,
          { opacity: 0, y: 18, scale: 0.965, rotation: -1.65 },
          { opacity: 1, y: 0, scale: 1, rotation: -1.15, duration: 0.62, ease: "power3.out" },
          0.04,
        );

        tl.fromTo(
          cursor,
          { opacity: 0, x: 0, y: 0, scale: 0.92 },
          { opacity: 1, x: 212, y: -410, scale: 1, duration: 0.78, ease: "power3.out" },
          0.66,
        );

        tl.to(
          cursor,
          { scale: 0.84, duration: 0.085, ease: "power2.in" },
          1.50,
        );
        tl.to(cursor, { scale: 1, duration: 0.085, ease: "power2.out" }, 1.585);
        tl.to(
          clickTarget,
          { scale: 0.95, duration: 0.085, ease: "power2.in" },
          1.50,
        );
        tl.to(clickTarget, { scale: 1, duration: 0.085, ease: "power2.out" }, 1.585);

        ripples.forEach((ripple, index) => {
          tl.fromTo(
            ripple,
            { opacity: 0.76, scale: 0.25 },
            {
              opacity: 0,
              scale: 4.5,
              duration: 0.7,
              ease: "power2.out",
              immediateRender: false,
            },
            1.51 + index * 0.085,
          );
        });

        // Dependency-order assembly: each task gets its own cue and absolute start time.
        const taskSequence = [
          { bar: bars[0], start: 1.58 },
          { bar: bars[1], start: 1.84 },
          { bar: bars[2], start: 2.10 },
          { bar: bars[3], start: 2.36 },
        ];
        taskSequence.forEach(({ bar, start }) => {
          tl.fromTo(
            bar,
            { opacity: 0, scaleX: 0 },
            { opacity: 1, scaleX: 1, duration: 0.36, ease: "power3.out" },
            start,
          );
        });
        tl.to(cursor, { opacity: 0, duration: 0.24, ease: "power1.out" }, 2.48);

        // Scene 2 — the product yields left as the verified metrics take its former anchor.
        tl.to(
          surface,
          { x: -400, y: -105, scale: 0.58, rotation: 0, duration: 0.9, ease: "power3.inOut" },
          2.80,
        );
        tl.fromTo(
          metrics,
          { opacity: 0, x: 160, scale: 0.72 },
          { opacity: 1, x: 0, scale: 1, duration: 0.78, ease: "back.out(1.45)" },
          3.03,
        );

        const minuteLayers = [
          byId("f4-depth-three"),
          byId("f4-depth-two"),
          byId("f4-depth-one"),
          byId("f4-count-minutes"),
        ];
        const minuteStack = byId("f4-count-minutes").parentElement;
        tl.fromTo(
          minuteStack,
          { scale: 0.5 },
          { scale: 1, duration: 1.58, ease: "power3.out" },
          3.10,
        );
        const minuteState = { value: 0 };
        tl.to(
          minuteState,
          {
            value: 80,
            duration: 1.58,
            ease: "power3.out",
            onUpdate: () => {
              const value = String(Math.round(minuteState.value));
              minuteLayers.forEach((layer) => {
                layer.textContent = value;
              });
            },
          },
          3.10,
        );

        const costEl = byId("f4-count-cost");
        tl.fromTo(
          costEl,
          { scale: 0.56 },
          { scale: 1, duration: 1.12, ease: "power3.out" },
          4.68,
        );
        const costState = { value: 0 };
        tl.to(
          costState,
          {
            value: 1.04,
            duration: 1.12,
            ease: "power3.out",
            onUpdate: () => {
              costEl.textContent = `$${costState.value.toFixed(2)}`;
            },
          },
          4.68,
        );

        tl.fromTo(
          pathChip,
          { opacity: 0, y: 20, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "power3.out" },
          5.05,
        );

        // Build the three explanation cues synchronously, before the timeline is registered.
        function appendChars(container, text, extraClass = "") {
          const group = document.createElement("span");
          if (extraClass) group.className = extraClass;
          for (const character of text) {
            const span = document.createElement("span");
            span.className = "typed-char";
            span.textContent = character === " " ? "\u00a0" : character;
            group.appendChild(span);
          }
          container.appendChild(group);
          return { group, chars: Array.from(group.querySelectorAll(".typed-char")) };
        }

        const lineOne = appendChars(byId("f4-line-one"), "CAPABILITY MATCHED");
        const criticalPhrase = appendChars(byId("f4-line-two"), "CRITICAL PATH", "critical-word");
        const lineTwoTail = appendChars(byId("f4-line-two"), "  ·  80 MIN");
        const lineThree = appendChars(byId("f4-line-three"), "DEADLINE + COST CHECKED");

        // Cut-the-curve seam into the explanation phase: same leftward path on both sides.
        tl.to(surface, { x: -630, opacity: 0, duration: 0.34, ease: "power4.in" }, 6.20);
        tl.to(metrics, { x: -230, opacity: 0, duration: 0.34, ease: "power4.in" }, 6.20);
        tl.fromTo(
          explain,
          { x: 230, opacity: 0.35 },
          {
            x: 0,
            opacity: 1,
            duration: 0.34,
            ease: "power4.out",
            immediateRender: false,
          },
          6.54,
        );

        const explanationCueSpecs = [
          {
            card: byId("f4-explain-one"),
            chars: lineOne.chars,
          },
          {
            card: byId("f4-explain-two"),
            chars: [...criticalPhrase.chars, ...lineTwoTail.chars],
          },
          {
            card: byId("f4-explain-three"),
            chars: lineThree.chars,
          },
        ];
        let explanationCursor = 6.78;
        const explanationCues = explanationCueSpecs.map((cue) => {
          const timedCue = { ...cue, start: explanationCursor };
          explanationCursor += 0.32 + cue.chars.length * 0.025;
          return timedCue;
        });

        explanationCues.forEach(({ card, chars, start }) => {
          tl.fromTo(
            card,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.32, ease: "power3.out" },
            start,
          );
          tl.fromTo(
            chars,
            { opacity: 0, y: 18 },
            {
              opacity: 1,
              y: 0,
              duration: 0.22,
              ease: "power3.out",
              stagger: 0.025,
            },
            start + 0.08,
          );
        });

        // One ASR-style attack / sustain / release envelope on the critical-path keyword.
        const glowDriver = { t: 6.20 };
        const criticalEl = criticalPhrase.group;
        const glowStart = 7.72;
        const glowEnd = 8.12;
        const attackDuration = 0.16;
        const releaseDuration = 0.36;
        const restLevel = 0.12;
        function keywordEnvelope(time) {
          if (time < glowStart) return 0;
          if (time < glowEnd) return Math.min((time - glowStart) / attackDuration, 1);
          if (time < glowEnd + releaseDuration) {
            const decay = (time - glowEnd) / releaseDuration;
            return 1 - decay * (1 - restLevel);
          }
          return restLevel;
        }
        tl.to(
          glowDriver,
          {
            t: 9.60,
            duration: 3.40,
            ease: "none",
            onUpdate: () => {
              const env = keywordEnvelope(glowDriver.t);
              criticalEl.style.color = `rgba(244, 91, 11, ${0.35 + env * 0.65})`;
              criticalEl.style.textShadow = `0 0 ${18 * env}px rgba(244, 91, 11, ${0.08 + env * 0.34})`;
              criticalEl.style.transform = `scale(${1 + env * 0.075})`;
            },
          },
          6.20,
        );

        // Scene 4 — matched leftward cut, then the real SHA-256 resolves in discrete groups.
        tl.to(explain, { x: -230, opacity: 0, duration: 0.34, ease: "power4.in" }, 9.60);
        tl.fromTo(
          hashStage,
          { x: 230, opacity: 0.35 },
          {
            x: 0,
            opacity: 1,
            duration: 0.34,
            ease: "power4.out",
            immediateRender: false,
          },
          9.78,
        );

        const hashGroups = [
          "badfe8ee",
          "10b0ec6e",
          "a9c1d1e5",
          "26eb77c2",
          "83a5b9d8",
          "afc80a19",
          "27b6fbf4",
          "7fe61c44",
        ];
        const hashSequence = hashGroups.map((_, index) => ({
          t: 9.80 + index * 0.058,
          text: hashGroups.slice(0, index + 1).join(" "),
        }));
        function hashAt(time) {
          for (let index = hashSequence.length - 1; index >= 0; index -= 1) {
            if (time >= hashSequence[index].t) return hashSequence[index].text;
          }
          return "";
        }

        const hashText = byId("f4-hash-text");
        const hashCursor = byId("f4-hash-cursor");
        const hashDriver = { t: 9.78 };
        tl.to(
          hashDriver,
          {
            t: 11.755,
            duration: 1.975,
            ease: "none",
            onUpdate: () => {
              hashText.textContent = hashAt(hashDriver.t);
              hashCursor.style.opacity =
                hashDriver.t >= 10.24
                  ? "0"
                  : Math.sin((hashDriver.t - 9.78) * Math.PI * 6) > 0
                    ? "1"
                    : "0";
            },
          },
          9.78,
        );

        const pillShell = byId("f4-pill-shell");
        const pillLabel = byId("f4-pill-label");
        const hashGlow = byId("f4-hash-glow");
        tl.fromTo(
          pillShell,
          { opacity: 0.88, scaleX: 0 },
          { opacity: 1, scaleX: 1, duration: 0.38, ease: "back.out(1.55)" },
          10.24,
        );
        tl.fromTo(
          pillLabel,
          { opacity: 0, y: 12, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.34, ease: "power3.out" },
          10.37,
        );
        tl.fromTo(
          hashGlow,
          { opacity: 0, scale: 0.86 },
          { opacity: 0.26, scale: 1, duration: 0.60, ease: "power2.out" },
          10.04,
        );

        window.__timelines["04-verifiable-plan"] = tl;
      </script>
    </template>
  </body>
</html>
