      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        const lateElements = [
          "#f06-path-browser",
          "#f06-path-api",
          "#f06-path-skill",
          "#f06-cta",
          "#f06-cursor",
          "#f06-final-url",
          "#f06-final-accent",
          "#f06-tagline-one",
          "#f06-tagline-two",
          "#f06-ripple-one",
          "#f06-ripple-two",
        ];

        tl.set(lateElements, { opacity: 0 }, 0);
        tl.set("#f06-cta", { scale: 0.68 }, 0);
        tl.set("#f06-final-url", { scale: 0.72 }, 0);
        tl.set("#f06-final-accent", { scaleX: 0 }, 0);
        tl.set(["#f06-ripple-one", "#f06-ripple-two"], { scale: 0 }, 0);

        tl.fromTo(
          "#f06-wordmark",
          { opacity: 0, y: 18, scale: 0.97 },
          { opacity: 1, y: 0, scale: 1, duration: 0.42, ease: "power3.out" },
          0.02,
        );

        tl.fromTo(
          ["#f06-ring-one", "#f06-ring-two", "#f06-ring-three"],
          { opacity: 0, scale: 0.94 },
          {
            opacity: 1,
            scale: 1,
            duration: 0.72,
            ease: "power3.out",
            stagger: 0.08,
          },
          0,
        );

        // Content-aware cue spacing: longer labels receive a slightly longer read beat.
        const accessPaths = [
          { id: "#f06-path-browser", text: "BROWSER", dx: 492, dy: -184 },
          { id: "#f06-path-api", text: "API", dx: 0, dy: 196 },
          { id: "#f06-path-skill", text: "SKILL.md", dx: -500, dy: -184 },
        ];
        const baseRead = 0.16;
        const secondsPerCharacter = 0.014;
        const cueHold = 0.1;
        let cumulativeCue = 0.16;
        const sequencedPaths = accessPaths.map((path) => {
          const start = cumulativeCue;
          const readDuration = baseRead + path.text.length * secondsPerCharacter + cueHold;
          cumulativeCue += readDuration;
          return { ...path, start, end: cumulativeCue };
        });

        sequencedPaths.forEach((path) => {
          tl.fromTo(
            path.id,
            { opacity: 0, y: 18, scale: 0.92 },
            {
              opacity: 1,
              y: 0,
              scale: 1,
              duration: 0.32,
              ease: "back.out(1.4)",
              immediateRender: false,
            },
            path.start,
          );
        });

        // A rotation-only micro-breath keeps the small mark alive while the wordmark stays fixed.
        const mark = document.getElementById("f06-swarm-mark");
        const markPhase = { p: 0 };
        tl.to(
          markPhase,
          {
            p: Math.PI * 2,
            duration: 1.25,
            ease: "none",
            onUpdate: () => {
              mark.style.transform = `rotate(${Math.sin(markPhase.p) * 0.35}deg)`;
            },
          },
          0.2,
        );

        // Scene 2: three paths converge, then the identity and CTA swap at one shared center.
        sequencedPaths.forEach((path) => {
          tl.to(
            path.id,
            {
              x: path.dx,
              y: path.dy,
              scale: 0.62,
              opacity: 0.15,
              duration: 0.42,
              ease: "power3.in",
            },
            1.6,
          );
          tl.to(path.id, { opacity: 0, duration: 0.12, ease: "none" }, 1.98);
        });

        tl.to(
          "#f06-wordmark",
          { scale: 0.68, opacity: 0, duration: 0.4, ease: "power2.in" },
          1.72,
        );
        tl.fromTo(
          "#f06-cta",
          { scale: 0.68, opacity: 0 },
          {
            scale: 1,
            opacity: 1,
            duration: 0.62,
            ease: "back.out(1.55)",
            immediateRender: false,
          },
          1.95,
        );

        // Scene 3: a decisive, decelerating cursor approach lands slightly off-center.
        tl.set("#f06-cursor", { opacity: 1 }, 3.3);
        tl.fromTo(
          "#f06-cursor",
          { x: 0, y: 0, scale: 1 },
          { x: 1162, y: -376, scale: 1, duration: 0.82, ease: "power3.out" },
          3.3,
        );

        // Cursor and CTA depress and spring back as one physical system.
        tl.to(
          ["#f06-cta", "#f06-cursor"],
          { scale: 0.92, duration: 0.12, ease: "power1.in" },
          4.28,
        );
        tl.to(
          ["#f06-cta", "#f06-cursor"],
          { scale: 1, duration: 0.52, ease: "back.out(1.8)" },
          4.43,
        );

        tl.fromTo(
          ["#f06-ripple-one", "#f06-ripple-two"],
          { scale: 0, opacity: 0.62 },
          {
            scale: 4.2,
            opacity: 0,
            duration: 0.7,
            ease: "power2.out",
            stagger: 0.08,
            immediateRender: false,
          },
          4.28,
        );

        // Scene 4: the clicked CTA resolves to the URL, then the promise assembles and settles.
        tl.to(
          "#f06-cta",
          { scale: 0.72, opacity: 0, duration: 0.36, ease: "power2.in" },
          5.2,
        );
        tl.to(
          "#f06-cursor",
          { x: 1240, y: -410, opacity: 0, duration: 0.32, ease: "power2.out" },
          5.2,
        );
        tl.fromTo(
          "#f06-final-url",
          { scale: 0.72, opacity: 0 },
          {
            scale: 1,
            opacity: 1,
            duration: 0.56,
            ease: "back.out(1.45)",
            immediateRender: false,
          },
          5.34,
        );
        tl.fromTo(
          "#f06-final-accent",
          { scaleX: 0, opacity: 0 },
          {
            scaleX: 1,
            opacity: 1,
            duration: 0.38,
            ease: "power3.out",
            immediateRender: false,
          },
          5.58,
        );
        tl.fromTo(
          "#f06-tagline-one",
          { opacity: 0, y: 18 },
          {
            opacity: 1,
            y: 0,
            duration: 0.42,
            ease: "power3.out",
            immediateRender: false,
          },
          5.7,
        );
        tl.fromTo(
          "#f06-tagline-two",
          { opacity: 0, y: 18 },
          {
            opacity: 1,
            y: 0,
            duration: 0.38,
            ease: "power3.out",
            immediateRender: false,
          },
          5.98,
        );

        window.__timelines["06-plan-the-swarm"] = tl;
      </script>
