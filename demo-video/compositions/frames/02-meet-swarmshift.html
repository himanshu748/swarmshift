          color: #f45b0b;

      <div
        id="root"
        data-composition-id="02-meet-swarmshift"
        data-width="1920"
        data-height="1080"
        data-duration="9.46"
      >
        <div
          id="f02-ground"
          class="clip"
          data-start="0"
          data-duration="8.96"
          data-track-index="0"
          aria-hidden="true"
        ></div>

        <section
          id="f02-stage"
          class="clip"
          data-start="0"
          data-duration="8.96"
          data-track-index="1"
          aria-label="SwarmShift deterministic planner product introduction"
        >
          <div id="f02-wordmark">
            <span id="f02-accent-line" aria-hidden="true"></span>
            <div class="f02-word-row" aria-label="SwarmShift">
              <span id="f02-word-swarm" class="f02-word">Swarm</span>

                  <div
                    id="f02-soft-mission"

                  <div
                    id="f02-soft-header"

              <div id="f02-ripple-2" class="f02-ripple" aria-hidden="true"></div>

              <div id="f02-cursor" aria-hidden="true">
                <svg viewBox="0 0 48 58" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M3 2.5L39.5 28.4L23.7 31.1L16.4 51.8L3 2.5Z"

                  <path

                    fill="none"

                  />
                  <path
                    d="M23.2 31.2L35.4 50.4"

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0–2.0s): content-length-aware word pieces and the
        // real planner surface settle together in a restrained 30/70 layout.
        tl.fromTo(
          "#f02-accent-line",
          { scaleX: 0, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.02,
        );

        const wordParts = ["f02-word-swarm", "f02-word-shift"];
        let wordAt = 0.06;
        wordParts.forEach((id) => {
          const el = document.getElementById(id);
          const revealDuration = 0.34 + el.textContent.length * 0.025;
          tl.fromTo(
            `#${id}`,
            { y: 42, opacity: 0 },
            { y: 0, opacity: 1, duration: revealDuration, ease: "power3.out" },
            wordAt,
          );
          wordAt += Math.min(0.14, revealDuration * 0.24);
        });

        tl.fromTo(
          "#f02-surface-shell",
          {
            y: 30,
            scale: 0.94,
            rotationX: 3.2,
            rotationY: -5.5,
            opacity: 0,
          },
          {
            y: 0,
            scale: 1,
            rotationX: 0,
            rotationY: 0,
            opacity: 1,
            duration: 1.22,
            ease: "power3.out",
          },
          0.04,
        );

        tl.fromTo(
          "#f02-cursor",
          { y: 26, scale: 0.86, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.46, ease: "power3.out" },
          1.36,
        );

        // Scene 2 (2.0–4.8s): cursor and nested camera converge on the fixed
        // Run plan coordinates baked from the supplied 1225x768 source image.
        // Nested camera math uses counter-translation = -target offset.
        const runTarget = { counterX: 579, counterY: 148, scale: 1.18 };
        const runZoomStart = 2.0;
        const runZoomDuration = 1.16;

        tl.to(
          "#f02-zoom-outer",
          {
            scale: runTarget.scale,
            duration: runZoomDuration,
            ease: "power3.inOut",
          },
          runZoomStart,
        );
        tl.to(
          "#f02-zoom-inner",
          {
            x: runTarget.counterX,
            y: runTarget.counterY,
            duration: runZoomDuration,
            ease: "power3.inOut",
          },
          runZoomStart,
        );
        tl.to(
          "#f02-cursor",
          {
            x: -454,
            y: -225,
            duration: 1.04,
            ease: "power3.out",
          },
          2.08,
        );

        tl.fromTo(
          "#f02-run-overlay",
          { opacity: 0, scale: 0.96 },
          { opacity: 1, scale: 1, duration: 0.26, ease: "power2.out" },
          2.88,
        );
        tl.fromTo(
          "#f02-click-target",
          { opacity: 0, scale: 0.94 },
          { opacity: 1, scale: 1, duration: 0.26, ease: "power2.out" },
          2.9,
        );

        // Crisp finite press/release chain: cursor compresses more than target.
        tl.to(
          "#f02-cursor",
          { scale: 0.86, duration: 0.08, ease: "power2.in" },
          3.22,
        );
        tl.to(
          "#f02-click-target",
          { scale: 0.95, duration: 0.08, ease: "power2.in" },
          3.22,
        );
        tl.to(
          "#f02-run-overlay",
          { scale: 0.95, duration: 0.08, ease: "power2.in" },
          3.22,
        );
        tl.to(
          "#f02-cursor",
          { scale: 1, duration: 0.11, ease: "power3.out" },
          3.31,
        );
        tl.to(
          "#f02-click-target",
          { scale: 1, duration: 0.11, ease: "power3.out" },
          3.31,
        );
        tl.to(
          "#f02-run-overlay",
          { scale: 1, duration: 0.11, ease: "power3.out" },
          3.31,
        );

        tl.fromTo(
          "#f02-ripple-1",
          { scale: 0, opacity: 0.72 },
          {
            scale: 4.2,
            opacity: 0,
            duration: 0.72,
            ease: "power2.out",
            immediateRender: false,
          },
          3.24,
        );
        tl.fromTo(
          "#f02-ripple-2",
          { scale: 0, opacity: 0.58 },
          {
            scale: 4.8,
            opacity: 0,
            duration: 0.78,
            ease: "power2.out",
            immediateRender: false,
          },
          3.33,
        );

        tl.fromTo(
          "#f02-deterministic-label",
          { y: 14, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
          3.44,
        );

        tl.to(
          "#f02-click-target",
          { opacity: 0, duration: 0.3, ease: "power2.out" },
          4.05,
        );
        tl.to(
          "#f02-run-overlay",
          { opacity: 0, duration: 0.3, ease: "power2.out" },
          4.05,
        );

        // Scene 3 (4.8–6.6s): the camera chases the cursor rightward while the
        // world counter-pans left into the timeline. Off-focus pixels soften;
        // the four execution rows return to sharpness in dependency order.
        const timelineTarget = { counterX: -204, counterY: -118, scale: 1.13 };
        const timelinePanStart = 4.8;
        const timelinePanDuration = 1.4;

        tl.to(
          "#f02-zoom-outer",
          {
            scale: timelineTarget.scale,
            duration: timelinePanDuration,
            ease: "power2.inOut",
          },
          timelinePanStart,
        );
        tl.to(
          "#f02-zoom-inner",
          {
            x: timelineTarget.counterX,
            y: timelineTarget.counterY,
            duration: timelinePanDuration,
            ease: "power2.inOut",
          },
          timelinePanStart,
        );
        tl.to(
          "#f02-cursor",
          {
            x: -220,
            y: -105,
            duration: 1.3,
            ease: "power2.inOut",
          },
          timelinePanStart,
        );
        tl.fromTo(
          ".f02-off-focus-softener",
          { opacity: 0 },
          { opacity: 0.64, duration: 0.12, ease: "power2.out" },
          4.82,
        );
        tl.fromTo(
          ".f02-row-softener",
          { opacity: 0 },
          { opacity: 0.82, duration: 0.12, ease: "power2.out" },
          4.82,
        );

        const timelineRows = [
          "f02-soft-row-research",
          "f02-soft-row-build",
          "f02-soft-row-verify",
          "f02-soft-row-ship",
        ];
        timelineRows.forEach((id, index) => {
          tl.to(
            `#${id}`,
            {
              opacity: 0,
              duration: 0.56,
              ease: "power2.out",
            },
            4.96 + index * 0.25,
          );
        });

        // Scene 4 (6.6–8.96s): the camera returns to the complete product read,
        // the full surface refocuses, and the REPLAN proof arrives then holds.
        tl.to(
          "#f02-zoom-outer",
          { scale: 1, duration: 0.66, ease: "power2.inOut" },
          6.58,
        );
        tl.to(
          "#f02-zoom-inner",
          { x: 0, y: 0, duration: 0.66, ease: "power2.inOut" },
          6.58,
        );
        tl.to(
          ".f02-off-focus-softener",
          { opacity: 0, duration: 0.5, ease: "power2.inOut" },
          6.56,
        );
        tl.fromTo(
          "#f02-replan-proof",
          { scale: 0, y: 16, opacity: 0 },
          {
            scale: 1,
            y: 0,
            opacity: 1,
            duration: 0.56,
            ease: "power3.out",
          },
          6.64,
        );

        window.__timelines["02-meet-swarmshift"] = tl;
      </script>
